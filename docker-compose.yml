version: '3.8'

services:
  db:
    image: 'postgres:16-alpine'
    container_name: editech_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: '${POSTGRES_USER:-editech_admin}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:-SecurePass2026!}'
      POSTGRES_DB: '${POSTGRES_DB:-editech_accounting}'
    volumes:
      - 'postgres_data:/var/lib/postgresql/data'
    # Exposing 5432 to the host is optional in production; containers talk internally via the service name 'db'

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: editech_streamlit_app
    restart: always
    ports:
      - '8501:8501'
    environment:
      DATABASE_URL: 'postgresql://${POSTGRES_USER:-editech_admin}:${POSTGRES_PASSWORD:-SecurePass2026!}@db:5432/${POSTGRES_DB:-editech_accounting}'
    depends_on:
      - db
    # --- COOLIFY ROUTING FIX LABELS START ---
    labels:
      - "coolify.managed=true"
      - "coolify.service.type=web"
      - "coolify.port=8501"  # Tells Traefik proxy to route public domain queries here
    # --- COOLIFY ROUTING FIX LABELS END ---

volumes:
  postgres_data:
    name: editech_postgres_prod_data  # Named volume persists database info across rebuilds
